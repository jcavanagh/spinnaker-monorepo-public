name: Deck Kayenta
run-name: Deck Kayenta ${{ github.ref_name }} (${{ github.event_name }})

on:
  workflow_dispatch:

  push:
    branches:
      - release-*
    paths:
      - 'deck-kayenta/**'

  pull_request:
    branches:
      - main
      - release-*
    paths:
      - 'deck-kayenta/**'

jobs:
  deck-kayenta:
    uses: ./.github/workflows/generic-build-publish.yml
    with:
      project: deck-kayenta
      publish: ${{ github.event_name != 'pull_request' }}
      publish-containers: false
      publish-debs: false
      publish-halconfig: false
      publish-npm: true
    secrets: inherit
