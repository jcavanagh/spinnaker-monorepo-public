name: Gate
run-name: Gate ${{ github.ref_name }} (${{ github.event_name }})

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - release-*
    paths:
      - 'gate/**'
      - 'fiat/**'
      - 'kork/**'

  pull_request:
    branches:
      - main
      - release-*
    paths:
      - 'gate/**'
      - 'fiat/**'
      - 'kork/**'

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/generic-build-publish
        with:
          project: gate
          publish: ${{ github.event_name != 'pull_request' }}
