name: Publish (npm)
description: Publishes NPM packages for a Spinnaker project
author: jcavanagh

inputs:
  project:
    description: Project to publish
    required: true
  is-release:
    description: Whether this is a release build or not
    required: true
  version:
    description: The version to publish
    required: true
  registry:
    description: NPM registry to publish to
    default: https://us-west2-npm.pkg.dev/spinnaker-monorepo-test/npm/
  gar-json-key:
    description: Google Artifact Registry JSON key

runs:
  using: "composite"
  steps:
    - name: Build JS
      env:
        ORG_GRADLE_PROJECT_version: ${{ inputs.version }}
      shell: bash
      run: |
        ./gradlew :${{ inputs.project }}:webpack

    - name: Login to Google Cloud
      uses: google-github-actions/auth@v2
      if: inputs.gar-json-key != ''
      with:
        credentials_json: ${{ inputs.gar-json-key }}

    - name: Rewrite package.json files
      env:
        NODE_ENV: production
      shell: bash
      run: |
        # NPM insists on the version being written into package.json
        # Instead of automating PRs to bump versions, just rewrite them in the build workspace and publish that
        rewrite_package_version() {
          echo "Rewriting $1 with version: ${{ inputs.version }} and publishing to registry ${{ inputs.registry }}"
          local json=''
          # Set version
          json=$(cat "$1" | jq '.version = "'"${{ inputs.version }}"'"')
          # Set publishing registry
          json=$(echo "$json" | jq '.publishConfig.registry = "${{ inputs.registry }}"')
          # Setup artifact registry login script
          json=$(echo "$json" | jq '.scripts["artifactregistry-login"] = "npx google-artifactregistry-auth --repo-config=./${{ inputs.project }}/.npmrc --credential-config=./${{ inputs.project }}/.npmrc"')
          echo "$json" > "$1"
        }
        
        rewrite_npmrc() {
          echo "Rewriting $1 with GAR info"
          echo "registry = ${{ inputs.registry }}" > "$1"
          echo "always-auth = true" > "$1"
        }

        for file in $(find ./${{ inputs.project }} -type d -name node_modules -prune -o -name 'package.json' -print); do
          rewrite_package_version "$file"
        done
        
        rewrite_npmrc "${{ inputs.project }}/.npmrc"

    - name: Initialize NPM GCP Auth
      shell: bash
      run: npx google-artifactregistry-auth --repo-config='./${{ inputs.project }}/.npmrc' --credential-config='./${{ inputs.project }}/.npmrc'

    - name: Lerna Publish
      if: hashFiles(format('{0}/lerna.json', inputs.project)) != ''
      env:
        NODE_ENV: production
      shell: bash
      working-directory: ${{ inputs.project }}
      run: npx lerna publish from-package --no-git-reset --force-publish --registry ${{ inputs.registry }} --yes --ignore-scripts

    - name: Non-Lerna Publish
      if: hashFiles(format('{0}/lerna.json', inputs.project)) == ''
      env:
        NODE_ENV: production
      shell: bash
      working-directory: ${{ inputs.project }}
      run: npm publish
